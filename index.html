<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Member List</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
padding:8px;
margin:5px;
width:90%;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.plus{
background:green;
color:white;
}

.save{
background:blue;
color:white;
}

.edit{
background:orange;
color:white;
}

</style>
</head>

<body>

<div class="container" id="loginPage">

<h2>Member Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="PIN"><br>

<button onclick="login()">Login</button>

</div>



<div class="container" id="formPage" style="display:none">

<h2 id="loggedUser"></h2>

<table id="memberTable">

<thead>
<tr>
<th>Sl No</th>
<th>Name</th>
<th>Designation</th>
<th>Edit</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<button class="plus" onclick="addRow()">+ Add Member</button>
<button class="save" onclick="saveData()">Save</button>

</div>



<script>

const users = {
"John":"1111",
"Adam":"2222",
"James":"3333",
"Rose":"4444",
"Lily":"5555",
"Lucy":"6666",
"Nick":"7777"
};

const scriptURL="YOUR_WEBAPP_URL";

let currentUser="";

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(users[u] && users[u]==p){

currentUser=u;

document.getElementById("loginPage").style.display="none";
document.getElementById("formPage").style.display="block";

document.getElementById("loggedUser").innerHTML="LOGGED USER : "+u;

loadData();

}else{

alert("Invalid login");

}

}



function addRow(name="",des=""){

let table=document.getElementById("tableBody");
let rowCount=table.rows.length+1;

let row=`
<tr>
<td>${rowCount}</td>
<td><input value="${name}"></td>
<td><input value="${des}"></td>
<td><button class="edit">Edit</button></td>
</tr>
`;

table.innerHTML+=row;

}



function saveData(){

let rows=[];
let table=document.getElementById("tableBody").rows;

for(let i=0;i<table.length;i++){

let sl=i+1;
let name=table[i].cells[1].children[0].value;
let des=table[i].cells[2].children[0].value;

rows.push({sl:sl,name:name,des:des});

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
user:currentUser,
rows:rows
})
})
.then(res=>res.text())
.then(d=>alert("Saved Successfully"));

}



function loadData(){

fetch(scriptURL+"?user="+currentUser)

.then(res=>res.json())

.then(data=>{

data.forEach(r=>{

addRow(r[1],r[2]);

});

});

}

</script>

</body>
</html>
