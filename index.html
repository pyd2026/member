<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
    .btn-login { background: #007bff; color: white; }
    .btn-add { background: #28a745; color: white; }
    .btn-save { background: #ffc107; color: black; }
    .hidden { display: none; }
    .row-box { background: #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display:none; justify-content:center; align-items:center; z-index:99; }
  </style>
</head>
<body>

<div id="overlay"><b>SAVING DATA... PLEASE WAIT</b></div>

<div class="card" id="loginDiv">
  <h2>Login</h2>
  <input type="text" id="u" placeholder="Username (e.g. John)">
  <input type="password" id="p" placeholder="Password (e.g. 1111)">
  <button class="btn-login" onclick="doLogin()">Login</button>
</div>

<div class="card hidden" id="formDiv">
  <h2 id="userTitle"></h2>
  <div id="list"></div>
  <button class="btn-add" onclick="addRow()">+ Add Row</button>
  <button class="btn-save" onclick="save()">Save to Database</button>
</div>

<script>
  const users = {"John":"1111","Adam":"2222","James":"3333","Rose":"4444","Lily":"5555","Lucy":"6666","Nick":"7777"};
  let user = "";
  let count = 0;

  function doLogin() {
    let name = document.getElementById('u').value;
    let pass = document.getElementById('p').value;
    if(users[name] && users[name] === pass) {
      user = name;
      document.getElementById('loginDiv').classList.add('hidden');
      document.getElementById('formDiv').classList.remove('hidden');
      document.getElementById('userTitle').innerText = user.toUpperCase();
      addRow();
    } else { alert("Wrong Login"); }
  }

  function addRow() {
    count++;
    let div = document.createElement('div');
    div.className = 'row-box';
    div.innerHTML = `<b>Sl: ${count}</b><input type="text" class="n" placeholder="Name"><input type="text" class="d" placeholder="Designation">`;
    document.getElementById('list').appendChild(div);
  }

  function save() {
    let names = document.querySelectorAll('.n');
    let desigs = document.querySelectorAll('.d');
    let rows = [];
    
    names.forEach((item, i) => {
      if(item.value) rows.push({sl: i+1, name: item.value, designation: desigs[i].value});
    });

    if(rows.length === 0) return alert("Enter at least one name");

    document.getElementById('overlay').style.display = "flex";

    // CALLING THE BACKEND
    google.script.run
      .withSuccessHandler(msg => {
        document.getElementById('overlay').style.display = "none";
        alert(msg);
        location.reload();
      })
      .withFailureHandler(err => {
        document.getElementById('overlay').style.display = "none";
        alert("CRITICAL ERROR: " + err.message);
      })
      .processData({currentUser: user, members: rows});
  }
</script>
</body>
</html>
